name: Scorecard

# OpenSSF Scorecard — supply-chain / security-posture signals (branch
# protection, pinned actions, token permissions, dangerous workflow patterns,
# etc.). Free for public repositories; results feed the Security → Code
# scanning dashboard. On a private repo this needs GitHub Advanced Security.

on:
  branch_protection_rule: {}
  push:
    branches: [main]
  schedule:
    - cron: '41 6 * * 1'   # weekly, off the :00 mark
  workflow_dispatch: {}

# Least-privilege at the top; the job widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write   # upload the SARIF results
      id-token: write          # publish results to the OpenSSF API
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2
        with:
          results_file: results.sarif
          results_format: sarif
          # Fresh-repository publishing is flaky; SARIF remains uploaded below.
          publish_results: false

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: results.sarif
          category: scorecard
