name: Lint

# Static linting that CodeQL does not cover: the bash installers/hooks
# (ShellCheck), the GitHub Actions workflows themselves (actionlint), and a
# Python SAST pass (Bandit) for the idioms CodeQL's default suites are lighter
# on — shell=True, eval/exec, weak crypto, insecure deserialisation, urlopen
# schemes. Linters run from tooling on the runner, an official pinned image, or
# a version-pinned PyPI package — no third-party wrapper action to trust.

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/*.sh'
      - 'hooks/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/*.sh'
      - 'hooks/**'
      - '.github/workflows/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  shellcheck:
    name: ShellCheck (bash)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run ShellCheck
        run: |
          shellcheck --version
          # Every tracked *.sh plus the shell hooks (which carry a bash shebang
          # but no extension). Warnings fail the job; installers must stay clean.
          files=$(git ls-files '*.sh')
          for h in hooks/pre-push hooks/pre-commit; do
            [ -f "$h" ] && head -1 "$h" | grep -qE '^#!.*(ba)?sh' && files="$files $h"
          done
          echo "Linting: $files"
          # shellcheck disable=SC2086
          shellcheck --severity=warning --external-sources $files

  actionlint:
    name: actionlint (workflows)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run actionlint
        # Official image pinned by immutable digest (rhysd/actionlint:1.7.7).
        # Dependabot's docker ecosystem is not enabled here; bump this digest
        # by hand (or add a docker update to dependabot.yml) on a new release.
        run: |
          docker run --rm -v "$PWD":/repo -w /repo \
            rhysd/actionlint@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9 \
            -color

  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Install Bandit
        # Version-pinned dev tool; the project itself stays stdlib-only at
        # runtime — Bandit is CI-only and never imported by the shipped code.
        run: python -m pip install --disable-pip-version-check bandit==1.9.4
      - name: Run Bandit (fail on medium+ severity / confidence)
        # The stdlib subprocess argv calls (B603/B607/B404) and the fail-open
        # try/except reads (B110/B112) are low-severity by design and stay
        # reported-but-non-blocking. The gate is the classes that would be real
        # findings here: shell=True (B602/HIGH), eval/exec, weak hashes,
        # insecure deserialisation, and non-https urlopen schemes (B310) — see
        # the # nosec justifications in the tree. Tests are excluded (assert is
        # expected there; B101).
        run: |
          bandit --version
          bandit -r m8shift.py scripts examples \
            --severity-level medium --confidence-level medium
